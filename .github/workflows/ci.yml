name: StepQuest CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: stepquest
          POSTGRES_PASSWORD: stepquest
          POSTGRES_DB: stepquest_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U stepquest -d stepquest_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    defaults:
      run:
        working-directory: backend

    env:
      NODE_ENV: test
      APP_VERSION: 0.1.1-alpha
      DATABASE_URL: postgres://stepquest:stepquest@127.0.0.1:5432/stepquest_test
      DATABASE_SSL: "false"
      JWT_SECRET: test-only-secret
      ENABLE_SUPER_MODE: "false"

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci
      - run: npx playwright install --with-deps chromium webkit
      - run: npm run build
      - run: npm run db:init
      - run: npm run audit:ci
      - run: npm run test:domain
      - run: npm run test:e2e
