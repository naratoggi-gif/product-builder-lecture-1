        paper_citadel: '\uC11C\uB958 \uC131\uCC44',
        message_garden: '\uC5F0\uB77D \uC815\uC6D0',
      }[themeKey] || '\uC791\uC740 \uC6D0\uC815';
    }

    function actionLabel(action) {
      return {
        complete: ko.actionComplete,
        shrink: ko.actionShrink,
        defer: ko.actionDefer,
        skip: ko.actionSkip,
        undo: ko.actionUndo,
        return: ko.actionReturn,
        costume_active: ko.actionCostume,
      }[action] || action;
    }

    function shortTime(value) {
      if (!value) return '';
      const date = new Date(value);
      return Number.isNaN(date.getTime()) ? '' : date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    const stepTimer = {
      stepId: null,
      total: 0,
      remaining: 0,
      running: false,
      intervalId: null,
    };
    const timerStorageKey = 'stepquest_timer_state';
    const restStorageKey = 'stepquest_rest_state';
    const focusStorageKey = 'stepquest_focus_mode';

    function timerStepId(step) {
      return String(step?.id || step?.stepId || '');
    }

    function timerTotal(step) {
      return Math.max(3, Math.min(180, Number(step?.estimatedSeconds || 10)));
    }

    function readStoredTimer(step, total) {
      try {
        const saved = JSON.parse(localStorage.getItem(timerStorageKey) || 'null');
        if (!saved || String(saved.stepId) !== timerStepId(step)) return null;
        const elapsed = saved.running && saved.updatedAt
          ? Math.floor((Date.now() - Date.parse(saved.updatedAt)) / 1000)
          : 0;
        const remaining = Math.max(0, Math.min(total, Number(saved.remaining || total) - Math.max(0, elapsed)));
        return {
          stepId: saved.stepId,
          total,
          remaining,
          running: Boolean(saved.running && remaining > 0),
        };
      } catch {
        return null;
      }
    }

    function saveTimerState() {
      if (!stepTimer.stepId) return;
      localStorage.setItem(timerStorageKey, JSON.stringify({
        stepId: stepTimer.stepId,
        total: stepTimer.total,
        remaining: stepTimer.remaining,
        running: stepTimer.running,
        updatedAt: new Date().toISOString(),
      }));
    }

    function clearTimerState() {
      localStorage.removeItem(timerStorageKey);
    }

    function readRestState() {
      try {
        const raw = localStorage.getItem(restStorageKey);
        const value = raw ? JSON.parse(raw) : null;
        if (!value?.stepId || !value?.stoppedAt) return null;
        return value;
      } catch {
        return null;
      }
    }

    function saveRestState(step, reason = 'not_now') {
      const rest = {
        stepId: timerStepId(step),
        stepTitle: step?.title || '',
        reason,
        stoppedAt: new Date().toISOString(),
      };
      localStorage.setItem(restStorageKey, JSON.stringify(rest));
      return rest;
    }

    function clearRestState() {
      localStorage.removeItem(restStorageKey);
    }

    function readFocusState() {
      try {
        const saved = JSON.parse(localStorage.getItem(focusStorageKey) || 'null');
        return saved?.stepId ? saved : null;
      } catch {
        return null;
      }
    }

    function setFocusMode(enabled, step = App.state.nextMicro) {
      if (enabled && step) {
        localStorage.setItem(focusStorageKey, JSON.stringify({
          stepId: timerStepId(step),
          startedAt: new Date().toISOString(),
        }));
      } else {
        localStorage.removeItem(focusStorageKey);
      }
    }

    function isFocusMode() {
      const focus = readFocusState();
      const step = App.state.nextMicro;
      if (!focus || !step) return false;
      if (String(focus.stepId) !== timerStepId(step)) {
        setFocusMode(false);
        return false;
      }
      return true;
    }

    function activeRestState() {
      const rest = readRestState();
      if (!rest) {
        const deferred = App.state.deferredStep;
        return deferred ? {
          stepId: timerStepId(deferred),
          stepTitle: deferred.title || '',
          reason: 'not_now',
          stoppedAt: deferred.deferredAt || new Date().toISOString(),
          serverBacked: true,
        } : null;
      }
      const step = App.state.nextMicro;
      if (step && String(rest.stepId) !== timerStepId(step)) {
        clearRestState();
        return null;
      }
      return rest;
    }

    function timerSnapshot(step) {
      const total = timerTotal(step);
      const nextStepId = timerStepId(step);
      if (String(stepTimer.stepId || '') !== nextStepId) {
        window.clearInterval(stepTimer.intervalId);
        const stored = readStoredTimer(step, total);
        stepTimer.stepId = nextStepId || null;
        stepTimer.total = stored?.total || total;
        stepTimer.remaining = stored?.remaining ?? total;
        stepTimer.running = Boolean(stored?.running);
        stepTimer.intervalId = null;
      }
      if (!stepTimer.total) {
        stepTimer.total = total;
        stepTimer.remaining = total;
      }
      return stepTimer;
    }

    function formatTimer(seconds) {
      const safe = Math.max(0, Number(seconds || 0));
      const minutes = Math.floor(safe / 60);
      const rest = safe % 60;
      return minutes ? `${minutes}:${String(rest).padStart(2, '0')}` : `${rest}s`;
    }

    function updateTimerView() {
      const time = document.getElementById('step-timer-time');
      const status = document.getElementById('step-timer-status');
      const bar = document.getElementById('step-timer-bar');
      const start = document.getElementById('btn-start-timer');
      const pause = document.getElementById('btn-pause-timer');
      const complete = document.getElementById('btn-complete-current');
      const total = Math.max(stepTimer.total || 1, 1);
      const progress = Math.round(((total - stepTimer.remaining) / total) * 100);
      if (time) time.textContent = formatTimer(stepTimer.remaining);
      if (status) status.textContent = stepTimer.remaining <= 0 ? ko.timerDone : stepTimer.running ? ko.timerRunning : ko.timerReady;
      if (bar) bar.style.width = `${Math.min(100, Math.max(0, progress))}%`;
      if (start) {
        start.disabled = stepTimer.running || stepTimer.remaining <= 0;
        start.textContent = ko.startTimer;
      }
      if (pause) pause.disabled = !stepTimer.running;
      if (complete) {
        complete.classList.toggle('ready-to-complete', stepTimer.remaining <= 0);
        complete.textContent = stepTimer.remaining <= 0 ? ko.completeNow : ko.complete;
      }
    }

    function tickStepTimer() {
      stepTimer.remaining = Math.max(0, stepTimer.remaining - 1);
      if (stepTimer.remaining <= 0) {
        stopTimerInterval();
        saveTimerState();
        App.log(`${ko.timerDoneLog}: ${App.state.nextMicro?.title || ko.oneNow}`);
        App.toast(ko.timerDoneToast);
      } else {
        saveTimerState();
      }
      updateTimerView();
    }

    function stopTimerInterval() {
      window.clearInterval(stepTimer.intervalId);
      stepTimer.intervalId = null;
      stepTimer.running = false;
    }

    function ensureTimerInterval() {
      if (!stepTimer.running || stepTimer.intervalId || stepTimer.remaining <= 0) return;
      stepTimer.intervalId = window.setInterval(tickStepTimer, 1000);
    }

    function startStepTimer() {
      if (!App.state.nextMicro || stepTimer.running || stepTimer.remaining <= 0) return;
      stepTimer.running = true;
      setFocusMode(true);
      saveTimerState();
      App.log(`${ko.timerStartedLog}: ${App.state.nextMicro.title}`);
      ensureTimerInterval();
      renderPage();
    }

    function pauseStepTimer() {
      stopTimerInterval();
      saveTimerState();
      updateTimerView();
    }

    function resetStepTimer() {
      stopTimerInterval();
      stepTimer.total = timerTotal(App.state.nextMicro);
      stepTimer.remaining = stepTimer.total;
      setFocusMode(false);
      saveTimerState();
      updateTimerView();
    }

            <div class="progress-head">
              <strong>${ko.skipSaved}</strong>
              <span>${ko.comboFlow} ${h(event.combo || 0)}</span>
            </div>
            <h2>${h(event.nextStepTitle || ko.noNextAction)}</h2>
            <div class="skip-map">
              <div><span>${ko.skippedFrom}</span><strong>${h(event.skippedStepTitle || ko.oneNow)}</strong></div>
              <div><span>${ko.skippedTo}</span><strong>${h(event.nextStepTitle || ko.noNextAction)}</strong></div>
              <div><span>${ko.dungeonPushed}</span><strong>${h(event.dungeonProgress || 0)}%</strong></div>
            </div>
            <p class="reward-note">${ko.skipNote}</p>
          </section>
        `;
      }
      if (event.type === 'undo') {
        return `
          <section class="panel reward-pulse undo-pulse">
            <div class="progress-head">
              <strong>${ko.undoDone}</strong>
              <span>${ko.undoReward}</span>
            </div>
            <h2>${h(event.nextStepTitle || event.stepTitle || ko.oneNow)}</h2>
            <div class="undo-map">
              <div><span>${ko.rewardXp}</span><strong>-${h(event.reversedXp || 0)}</strong></div>
              <div><span>${ko.material}</span><strong>-${h(event.reversedMaterial || 0)}</strong></div>
              <div><span>${ko.nextEntrance}</span><strong>${h(event.nextStepTitle || ko.oneNow)}</strong></div>
            </div>
          </section>
        `;
      }
      const facilityLabel = event.facilityLabel || (event.facilityKey ? App.facilityInfo(event.facilityKey).label : ko.villageGrew);
      const facilityDetail = event.facilityDetail || (event.facilityKey ? App.facilityInfo(event.facilityKey).detail : '');
      const facilityExample = event.facilityExample || (event.facilityKey ? App.facilityInfo(event.facilityKey).example : '');
      return `
        <section class="panel reward-pulse">
          <div class="progress-head">
            <strong>${ko.reward}</strong>
            <span>${event.chestReady ? ko.chestOpened : `${ko.comboFlow} ${h(event.combo || 0)}`}</span>
          </div>
          <h2>${eventTitle}</h2>
          <div class="reward-pulse-grid">
            <div><strong>+${h(event.xp || 0)}</strong><span>${ko.rewardXp}</span></div>
            <div><strong>+${h(event.material || 0)}</strong><span>${ko.material}</span></div>
            <div><strong>${h(event.dungeonProgress || 0)}%</strong><span>${ko.dungeonPushed}</span></div>
            <div class="facility-reward">
              <strong>${h(facilityLabel)} +${h(event.facilityXp || 0)}</strong>
              <span>${event.returnCompleted ? ko.returnCompleted : event.facilityLeveledUp ? `Lv.${h(event.facilityLevel || 1)} ${ko.facilityReward}` : ko.facilityReward}</span>
            </div>
          </div>
          ${Number(event.costumeMultiplier || 1) > 1 ? `
            <p class="reward-note"><b>${ko.costumeBonus}</b> x${h(Number(event.costumeMultiplier || 1).toFixed(2))}</p>
          ` : ''}
          ${event.nextStepTitle || event.clearedGoalTitle ? `
            <div class="next-entrance">
              <span>${event.clearedGoalTitle ? ko.goalCleared : ko.nextEntrance}</span>
              <strong>${h(event.clearedGoalTitle || event.nextStepTitle || ko.noNextEntrance)}</strong>
            </div>
          ` : ''}
          ${event.type === 'complete' && event.stepId ? `
            <div class="section-actions undo-actions">
              <button id="btn-undo-complete" class="ghost" data-step-id="${h(event.stepId)}">${ko.undoComplete}</button>
            </div>
          ` : ''}
          ${facilityDetail || facilityExample ? `
            <p class="reward-note">${h(facilityDetail)} ${facilityExample ? `${ko.facilityActions}: ${h(facilityExample)}` : ''}</p>
          ` : ''}
        </section>
      `;
    }

    function renderReminderStats() {
      const stats = App.state.stats || { attempts: {}, steps: {}, rewards: {} };
      const reminderAt = App.state.reminder?.at ? new Date(App.state.reminder.at).toLocaleTimeString() : ko.noReminder;
      const hasReminderAction = Boolean(App.state.reminder?.stepId || App.state.nextMicro);
      return `
        <section class="tile-grid">
          <div class="panel">
            <h2>${ko.reminder}</h2>
            <div class="goal-form reminder-form">
              <label>
                <span>${ko.reminderMinutes}</span>
                <input id="reminder-minutes" type="number" min="1" max="1440" value="10" />
              </label>
            </div>
            <div class="section-actions">
              <button id="btn-save-reminder" class="alt">${ko.saveReminder}</button>
            </div>
            <p class="meta">${h(reminderAt)}</p>
            ${hasReminderAction ? `
              <div class="reminder-action-box ${App.state.reminderDue ? 'due' : ''}">
                <div class="progress-head">
                  <strong>${ko.reminderReady}</strong>
                  <span>${h(App.state.nextMicro?.estimatedSeconds || 10)}s</span>
                </div>
                <p class="meta">${ko.reminderActionMeta}</p>
                <div class="section-actions">
                  <button class="ok btn-reminder-action" data-action="complete">${ko.complete}</button>
                  <button class="alt btn-reminder-action" data-action="snooze">${ko.snoozeFive}</button>
                  <button class="ghost btn-reminder-action" data-action="shrink">${ko.shrink}</button>
                  <button class="warn btn-reminder-action" data-action="skip">${ko.skip}</button>
                </div>
              </div>
            ` : ''}
          </div>
          <div class="panel">
            <h2>${ko.stats}</h2>
            <div class="stat-grid">
              <div class="stat"><label>${ko.totalSteps}</label><strong>${h(stats.steps?.totalSteps || 0)}</strong></div>
              <div class="stat"><label>${ko.completedSteps}</label><strong>${h(stats.steps?.completedSteps || 0)}</strong></div>
              <div class="stat"><label>${ko.shrinkCount}</label><strong>${h(stats.attempts?.shrink || 0)}</strong></div>
              <div class="stat"><label>${ko.deferCount}</label><strong>${h(stats.attempts?.defer || 0)}</strong></div>
            </div>
            <div class="progress">
              <div class="progress-head"><span>${ko.returnMarks}</span><span>${h(stats.rewards?.return_mark || App.state.player?.returnMarks || 0)}</span></div>
              <div class="progress-bar"><i style="width:${Math.min((stats.steps?.completedSteps || 0) * 12, 100)}%"></i></div>
            </div>
            <div class="recent-trace">
              <div class="progress-head"><strong>${ko.recentTrace}</strong><span>${h((stats.recent || []).length)}</span></div>
              ${(stats.recent || []).length ? `
                <div class="trace-list">
                  ${(stats.recent || []).map((item) => `
                    <div class="trace-item">
                      <span class="badge">${h(actionLabel(item.action))}</span>
                      <strong>${h(item.stepTitle || ko.oneNow)}</strong>
                      <small>${h(shortTime(item.createdAt))}${item.reason ? ` · ${h(item.reason)}` : ''}</small>
                    </div>
                  `).join('')}
                </div>
              ` : `<p class="meta">${ko.noRecentTrace}</p>`}
            </div>
          </div>
        </section>
      `;
    }

    const villageSlots = [
      { key: 'knowledge_tower', x: 12, y: 18 },
      { key: 'guild_office', x: 36, y: 14 },
      { key: 'archive', x: 61, y: 18 },
      { key: 'workshop', x: 22, y: 44 },
      { key: 'training_ground', x: 48, y: 43 },
      { key: 'inn', x: 73, y: 41 },
      { key: 'kitchen', x: 35, y: 69 },
      { key: 'garden', x: 63, y: 68 },
    ];

    function buildingClass(facilityKey) {
      const classes = {
        knowledge_tower: 'tower',
        guild_office: 'hall',
        archive: 'scribe',
        training_ground: 'training',
        inn: 'inn',
        kitchen: 'house',
        garden: 'garden',
        workshop: 'forge',
      };
      return classes[facilityKey] || 'house';
    }

    function renderVillageScene(village) {
      const equippedCostume = String(App.state.player?.equippedCostumeId || 'starter_mage').replace(/[^a-z0-9_-]/gi, '');
      const facilities = villageSlots.map((slot) => {
        const facility = village.find((item) => item.facilityKey === slot.key) || {};
        const info = App.facilityInfo(slot.key);
        const level = Number(facility.level || 1);
        const isActive = Number(facility.xp || 0) > 0 || level > 1;
        return `
          <button
            class="village-building ${buildingClass(slot.key)} ${isActive ? 'active' : ''}"
            style="--x:${slot.x}%; --y:${slot.y}%; --rank:${Math.min(level, 5)}"
            title="${h(facility.label || info.label)} Lv.${h(level)}"
            aria-label="${h(facility.label || info.label)} Lv.${h(level)}"
          >
            <span class="roof"></span>
            <span class="body"></span>
            <span class="door"></span>
            <small>Lv.${h(level)}</small>
          </button>
        `;
      }).join('');

      return `
        <div class="village-scene" aria-label="${ko.village}">
          <div class="village-sky">
            <i></i><i></i><i></i>
          </div>
          <div class="village-board">
            <div class="village-river"></div>
            <div class="village-path path-a"></div>
            <div class="village-path path-b"></div>
            ${Array.from({ length: 8 }).map((_, index) => `<span class="village-tile tile-${index % 5}"></span>`).join('')}
            ${facilities}
            <span class="player-character player-${h(equippedCostume)}" title="${h(App.state.player?.equippedCostumeName || '')}"><i></i></span>
            <span class="villager villager-a"><i></i></span>
            <span class="villager villager-b"><i></i></span>
            <span class="tiny-monster"><i></i></span>
          </div>
        </div>
      `;
    }

    function renderVillage() {
      const village = App.state.village || [];
      return `
        <section class="panel" id="village">
          <h2>${ko.village}</h2>
          ${village.length ? `
            ${renderVillageScene(village)}
            <div class="village-grid">
              ${village.map((facility) => {
                const xp = Number(facility.xp || 0);
                const next = Math.max(5, Number(facility.level || 1) * 5);
                const progress = Math.min(100, Math.round((xp % 5) * 20));
                const info = App.facilityInfo(facility.facilityKey);
                const left = Math.max(0, next - xp);
                return `
                  <div class="village-facility">
                    <div class="progress-head">
                      <strong>${h(facility.label || facility.facilityKey)}</strong>
                      <span>Lv.${h(facility.level || 1)}</span>
                    </div>
                    <div class="progress-bar"><i style="width:${progress}%"></i></div>
                    <div class="sub">${ko.xp} ${h(xp)}/${h(next)} | ${ko.villageMaterial} ${h(facility.material || 0)}</div>
                    <p class="facility-detail">${h(facility.detail || info.detail)}</p>
                    <div class="facility-example">${ko.facilityActions}: ${h(facility.example || info.example)}</div>
                    <div class="facility-next">${ko.nextVillageLevel} ${h(left)} XP</div>
                  </div>
                `;
              }).join('')}
            </div>
          ` : `<div class="empty">${ko.villageEmpty}</div>`}
        </section>
      `;
    }

    function renderChain() {
      const items = App.state.micro || [];
      if (!items.length) return '';
      return `
        <details class="panel chain-panel">
          <summary>${ko.chain}</summary>
          <div class="list chain-list">
            ${items.map((item) => `
              <div class="list-item chain-item ${h(statusClass(item.status))}">
                <strong>${h(item.title)}</strong>
                <div class="sub">${h(item.estimatedSeconds || 10)}s | ${h(statusLabel(item.status))}</div>
              </div>
            `).join('')}
          </div>
        </details>
      `;
    }

    function wirePage() {
      document.getElementById('btn-create-stepquest')?.addEventListener('click', async () => {
        const title = document.getElementById('goal-title').value.trim();
        if (!title) {
          App.toast(ko.titleNeeded, true);
          return;
        }
        try {
          await App.createStepQuestGoal({
            title,
            category: document.getElementById('goal-category').value,
            burdenLevel: Number(document.getElementById('goal-burden').value),
            energyLevel: document.getElementById('goal-energy').value,
            targetAt: document.getElementById('goal-target-at').value ? new Date(document.getElementById('goal-target-at').value).toISOString() : undefined,
            recurrenceRule: document.getElementById('goal-recurrence').value || undefined,
            location: document.getElementById('goal-location').value.trim() || undefined,
            availableMinutes: document.getElementById('goal-available-minutes').value ? Number(document.getElementById('goal-available-minutes').value) : undefined,
            obstacle: document.getElementById('goal-obstacle').value || undefined,
          });
          clearTimerState();
          setFocusMode(false);
          App.toast(ko.created);
          renderPage();
        } catch (error) {
          App.toast(`${ko.failedCreate}: ${error.message}`, true);
        }
      });

      document.getElementById('btn-complete-current')?.addEventListener('click', async () => {
        try {
          pauseStepTimer();
          clearTimerState();
          setFocusMode(false);
          await App.completeMicro(App.state.nextMicro.id);
          App.toast(App.t.completed);
          renderPage();
        } catch (error) {
          App.toast(`${ko.failedComplete}: ${error.message}`, true);
        }
      });

      document.getElementById('btn-open-shrink')?.addEventListener('click', () => {
        const panel = document.getElementById('shrink-panel');
        if (panel) panel.hidden = !panel.hidden;
      });

      document.getElementById('btn-undo-complete')?.addEventListener('click', async (event) => {
        try {
          clearTimerState();
          setFocusMode(false);
          await App.undoMicro(event.currentTarget.dataset.stepId);
          App.toast(ko.undoDone);
          renderPage();
        } catch (error) {
          App.toast(`${ko.undoFailed}: ${error.message}`, true);
        }
      });

      document.getElementById('btn-start-timer')?.addEventListener('click', startStepTimer);
      document.getElementById('btn-pause-timer')?.addEventListener('click', pauseStepTimer);
      document.getElementById('btn-reset-timer')?.addEventListener('click', resetStepTimer);
      document.getElementById('btn-exit-focus')?.addEventListener('click', () => {
        setFocusMode(false);
        renderPage();
      });

      document.querySelectorAll('.reason-button').forEach((button) => {
        button.addEventListener('click', async () => {
          try {
            clearTimerState();
            setFocusMode(false);
            await App.shrinkMicro(App.state.nextMicro.id, button.dataset.reason);
            App.toast(App.t.shrunk);
            renderPage();
          } catch (error) {
            App.toast(`${ko.failedShrink}: ${error.message}`, true);
          }
        });
      });

      document.getElementById('btn-skip-current')?.addEventListener('click', async () => {
        try {
          clearTimerState();
          setFocusMode(false);
          await App.skipMicro(App.state.nextMicro.id);
          App.toast(App.t.skipped);
          renderPage();
        } catch (error) {
          App.toast(`${ko.failedSkip}: ${error.message}`, true);
        }
      });

      document.getElementById('btn-stop-today')?.addEventListener('click', () => {
        clearTimerState();
        setFocusMode(false);
        const step = App.state.nextMicro;
        App.deferMicro(App.state.nextMicro.id, 'not_now')
          .then(() => {
            saveRestState(step, 'not_now');
            App.toast(ko.restSaved);
            renderPage();
          })
          .catch((error) => App.toast(`${ko.failedSkip}: ${error.message}`, true));
      });

      document.getElementById('btn-resume-original')?.addEventListener('click', async () => {
        try {
          const rest = readRestState();
          const deferred = App.state.deferredStep;
          const stepId = deferred?.id || (!App.state.token ? rest?.stepId : null);
          if (stepId) await App.resumeMicro(stepId);
          clearRestState();
          clearTimerState();
          setFocusMode(false);
          App.toast(ko.returnMessage);
          renderPage();
        } catch (error) {
          App.toast(`${ko.returnFailed}: ${error.message}`, true);
        }
      });

      document.getElementById('btn-return-small')?.addEventListener('click', async () => {
        try {
          const rest = readRestState();
          const stepId = rest?.stepId || App.state.nextMicro?.id;
          if (!stepId) return;
          clearRestState();
          clearTimerState();
          setFocusMode(false);
          await App.shrinkMicro(stepId, 'not_now');
          App.toast(ko.shrinkCreated);
          renderPage();
        } catch (error) {
          App.toast(`${ko.returnFailed}: ${error.message}`, true);
        }
      });

      document.getElementById('btn-costume-active')?.addEventListener('click', async () => {
        try {
          const equipped = App.state.shop.find((costume) => costume.equipped)?.id || App.state.player?.equippedCostumeId || 'starter_mage';
          clearTimerState();
          setFocusMode(false);
          await App.activateCostume(equipped);
          App.toast(ko.costumeActivated);
          renderPage();
        } catch (error) {
          App.toast(`${ko.failedShrink}: ${error.message}`, true);
        }
      });

      document.querySelectorAll('.btn-equip-costume').forEach((button) => {
        button.addEventListener('click', async () => {
          try {
            await App.equipCostume(button.dataset.costumeId);
            App.toast(ko.costumeEquipped);
            renderPage();
          } catch (error) {
            App.toast(error.message, true);
          }
        });
      });

      document.querySelectorAll('.btn-dungeon-status').forEach((button) => {
        button.addEventListener('click', async () => {
          try {
            await App.setDungeonStatus(button.dataset.goalId, button.dataset.status);
            App.toast(button.dataset.status === 'ACTIVE' ? ko.dungeonResumed : button.dataset.status === 'PAUSED' ? ko.dungeonPaused : ko.dungeonArchived);
            renderPage();
          } catch (error) {
            App.toast(error.message, true);
          }
        });
      });

      document.querySelectorAll('.btn-regenerate-dungeon').forEach((button) => {
        button.addEventListener('click', async () => {
          try {
            clearTimerState();
            setFocusMode(false);
            await App.regenerateGoal(button.dataset.goalId, 'too_big');
            App.toast(ko.regenerated);
            renderPage();
          } catch (error) {
            App.toast(`${ko.failedRegenerate}: ${error.message}`, true);
          }
        });
      });

      document.getElementById('btn-start-return')?.addEventListener('click', async () => {
        try {
          clearTimerState();
          await App.startReturnFlow();
          App.toast(ko.returnMessage);
          renderPage();
        } catch (error) {
          App.toast(`${ko.failedReturn}: ${error.message}`, true);
        }
      });

      document.getElementById('btn-save-reminder')?.addEventListener('click', async () => {
        try {
          const minutes = Number(document.getElementById('reminder-minutes').value || 10);
          await App.saveReminder(minutes);
          App.toast(ko.reminderSaved);
          renderPage();
        } catch (error) {
          App.toast(`${ko.failedReminder}: ${error.message}`, true);
        }
      });

      document.querySelectorAll('.btn-reminder-action').forEach((button) => {
        button.addEventListener('click', async () => {
          try {
            if (button.dataset.action !== 'snooze') clearTimerState();
            await App.handleReminderAction(button.dataset.action, 5);
            App.toast(button.dataset.action === 'snooze' ? ko.reminderSnoozed : ko.completed);
            renderPage();
          } catch (error) {
            App.toast(`${ko.reminderActionFailed}: ${error.message}`, true);
          }
        });
      });

      updateTimerView();
      ensureTimerInterval();
    }

    function renderPage() {
      App.renderShell(ko.pageTitle);
      const root = document.getElementById('page-root');
      const rest = activeRestState();
      const focus = !rest && isFocusMode();
      root.classList.toggle('focus-page', focus);
      root.innerHTML = focus
        ? [
          renderCurrentStep(App.state.nextMicro),
          renderGamePulse(),
        ].join('')
        : [
          renderGoalForm(),
          rest ? renderRestPanel(rest) : renderCurrentStep(App.state.nextMicro),
          renderGamePulse(),
          renderReturnPanel(),
          renderReminderStats(),
          renderExpeditionSummary(),
          renderVillage(),
          renderChain(),
        ].join('');
      wirePage();
    }

    window.addEventListener('DOMContentLoaded', async () => {
      try {
        await App.refresh();
      } catch (error) {
        App.log(`${ko.initFailed}: ${error.message}`);
      }
      await window.StepQuestV02UI.mount({ App, Core: window.StepQuestV02App });
    });

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch((error) => {
          App.log(`service worker: ${error.message}`);
        });
      });
    }
  </script>
</body>
</html>
