services:
  - type: web
    name: stepquest-staging
    runtime: node
    rootDir: backend
    plan: starter
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: ENABLE_SUPER_MODE
        value: "false"
      - key: APP_VERSION
        value: 0.1.1-alpha
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: TRUST_PROXY
        value: "true"
      - key: JWT_SECRET
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: stepquest-staging-db
          property: connectionString

databases:
  - name: stepquest-staging-db
    plan: starter
